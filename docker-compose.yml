services:
    backend:
        build:
            context: .
            target: runner # Apunta explícitamente a la etapa final de producción
            args:
                - PORT=${PORT:-3000}
        restart: unless-stopped
        container_name: inventoryApp_Backend
        env_file:
            - ./.env.prod # Usamos el archivo estándar .env
        ports:
            - '${PORT:-3000}:${PORT:-3000}' # Usa 3000 si PORT no está definido en el host
        environment:
            - TZ=America/Caracas
            - NODE_ENV=production
            - LOG_DIR=/app/logs # Asegura que la app escriba en el volumen montado
        depends_on: # Se asegura de que las dependencias se inicien primero
            - postgres
            - redis
            - rabbitmq
        volumes:
            - ./logs_data:/app/logs
        deploy:
            resources:
                limits:
                    cpus: '0.50' # Limita el uso de CPU al 50%
                    memory: 512M # Limita la memoria a 512MB
                reservations:
                    cpus: '0.25' # Reserva al menos el 25% de CPU
                    memory: 256M # Reserva al menos 256MB de memoria

    nginx:
        image: nginx:latest
        container_name: nginx_inventory
        restart: always
        ports:
            - '80:80'
            - '443:443'
        volumes:
            # Montas tu configuración de Nginx personalizada
            - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
            # Montas los certificados que obtengas (ej. con Certbot)
            - ./certbot/conf:/etc/letsencrypt
        depends_on:
            - backend

    postgres:
        image: postgres:16-alpine
        container_name: postgres_prod
        restart: always
        env_file: .env.prod
        ports:
            - '5430:5432'
        volumes:
            - ./postgres_data:/var/lib/postgresql/data
        environment:
            - POSTGRES_USER=${POSTGRES_USER:-postgres}
            # - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-7n6xKpovNGwF}
            - POSTGRES_DB=${POSTGRES_DB:-inventoryApp_Prod}
            - TZ=America/Caracas
            - LANG=es_VE.UTF-8 # Configura el idioma (Venezuela)
            - LC_ALL=es_VE.UTF-8

    redis:
        image: redis:latest
        container_name: redis_prod
        restart: always
        env_file:
            - path: ./.env.prod
        ports:
            - '${REDIS_PORT:-6379}:6379'
        environment:
            - REDIS_PASSWORD=${REDIS_PASSWORD:-Man12345.}
            - TZ=America/Caracas
        volumes:
            - ./redis_data:/data
        command: sh -c "redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes"

    rabbitmq:
        image: 'rabbitmq:latest'
        container_name: rabbitmq_prod
        restart: unless-stopped
        ports:
            - '5672:5672'
            - '15672:15672'
        environment:
            - RABBITMQ_DEFAULT_USER={RABBITMQ_USER:-appadmin}
            - RABBITMQ_DEFAULT_PASS={RABBITMQ_PASSWORD:-Man12345.}
        volumes:
            - ./rabbitmq_data:/var/lib/rabbitmq

networks:
    default:
        external: true
        name: inventory-net
