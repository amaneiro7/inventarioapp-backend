upstream backend_server {
    server backend:3000;
}

upstream frontend_server {
    server inventario-frontend:80;
}

# BLOQUE 1: Captura todo lo que venga por HTTP (Puerto 80)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    # server_name srvdocker srvdocker.corp.bnc.com 10.0.11.100 192.168.11.5;
    server_name _; # Captura todo el tráfico HTTP

    return 301 https://srvdocker.corp.bnc.com$request_uri;
    
}

# BLOQUE 2: Captura intentos HTTPS por IP o nombres alternativos
server {
    listen 443 ssl;
    server_name srvdocker 10.0.11.100 192.168.11.5;    
    
    # Usamos los mismos certificados (el navegador dará aviso de seguridad,
    # pero al aceptar, Nginx hará la redirección al nombre correcto)
    ssl_certificate /etc/letsencrypt/live/srvdocker.corp.bnc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/srvdocker.corp.bnc.com/privkey.pem;

    return 301 https://srvdocker.corp.bnc.com$request_uri;
    
}

# BLOQUE 3: Servidor Principal (El único que sirve la App)
server {
    listen 443 ssl;
    server_name srvdocker.corp.bnc.com;

    # Rutas de certificados generados con mkcert
    # Asegúrate de montar tus archivos generados por mkcert en esta ruta dentro del docker-compose
    ssl_certificate /etc/letsencrypt/live/srvdocker.corp.bnc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/srvdocker.corp.bnc.com/privkey.pem;

    # Optimización de Logs (útil para tu monitoreo)
    access_log /var/log/nginx/inventario_access.log;
    error_log /var/log/nginx/inventario_error.log;

    # 1. Redirigir tráfico de API al Backend
    location /api/v1/ {
        proxy_pass http://backend_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 2. Redirigir todo lo demás al Frontend
    location / {
        proxy_pass http://frontend_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}